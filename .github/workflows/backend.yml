name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'myapp/server/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'myapp/server/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./myapp/server
        run: npm install
      
      - name: Lint code
        working-directory: ./myapp/server
        run: npm run lint
      
      - name: Run tests
        working-directory: ./myapp/server
        run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Check Render secrets
        id: render_guard
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -n "$RENDER_SERVICE_ID" ] && [ -n "$RENDER_API_KEY" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Render secrets found."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Render secrets missing. Skipping Render deployment."
          fi
      
      - name: Deploy to Render
        if: steps.render_guard.outputs.should_run == 'true'
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
